<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lokesh ❤️ GF</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
}

/* floating hearts background */

.hearts{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.heart{
position:absolute;
color:white;
animation:float 10s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* glass UI */

.card{
z-index:2;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:25px;
padding:30px;
width:360px;
text-align:center;
color:white;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(.8)}
to{opacity:1;transform:scale(1)}
}

input{
padding:10px;
width:80%;
border-radius:10px;
border:none;
margin:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin:5px;
transition:.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1e56;
}

.menu button{
display:block;
width:200px;
margin:10px auto;
}

.page{display:none}

/* chat */

#messages{
height:150px;
overflow:auto;
background:rgba(255,255,255,0.2);
border-radius:10px;
padding:10px;
margin-bottom:10px;
text-align:left;
}

/* game */

table{margin:auto}

.cell{
width:80px;
height:80px;
font-size:28px;
background:white;
color:black;
border-radius:10px;
}

/* gallery */

.gallery img{
width:90px;
border-radius:10px;
margin:5px;
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="card">

<!-- LOGIN -->

<div id="login">

<h2>Our Love Space ❤️</h2>

<input id="room" placeholder="Enter Love Code">

<br>

<button onclick="enter()">Enter</button>

</div>


<!-- HOME -->

<div id="home" class="page">

<h2>Lokesh ❤️ GF</h2>

<div class="menu">

<button onclick="openPage('chat')">💬 Chat</button>
<button onclick="openPage('game')">🎮 Game</button>
<button onclick="openPage('photos')">📷 Memories</button>
<button onclick="openPage('music')">🎵 Music</button>

</div>

</div>


<!-- CHAT -->

<div id="chat" class="page">

<h3>Love Chat 💬</h3>

<div id="messages"></div>

<input id="msg">

<button onclick="send()">Send</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>


<!-- GAME -->

<div id="game" class="page">

<h3>Tic Tac Toe</h3>

<table>

<tr>
<td><button class="cell" onclick="play(0)"></button></td>
<td><button class="cell" onclick="play(1)"></button></td>
<td><button class="cell" onclick="play(2)"></button></td>
</tr>

<tr>
<td><button class="cell" onclick="play(3)"></button></td>
<td><button class="cell" onclick="play(4)"></button></td>
<td><button class="cell" onclick="play(5)"></button></td>
</tr>

<tr>
<td><button class="cell" onclick="play(6)"></button></td>
<td><button class="cell" onclick="play(7)"></button></td>
<td><button class="cell" onclick="play(8)"></button></td>
</tr>

</table>

<br>

<button onclick="resetGame()">Reset</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>


<!-- PHOTOS -->

<div id="photos" class="page">

<h3>Our Memories 📷</h3>

<div class="gallery">

<img src="https://picsum.photos/100?1">
<img src="https://picsum.photos/100?2">
<img src="https://picsum.photos/100?3">

</div>

<button onclick="openPage('home')">Back</button>

</div>


<!-- MUSIC -->

<div id="music" class="page">

<h3>Our Song 🎵</h3>

<audio controls>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<br>

<button onclick="openPage('home')">Back</button>

</div>

</div>



<script>

/* floating hearts */

for(let i=0;i<25;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"
h.style.left=Math.random()*100+"%"
h.style.fontSize=15+Math.random()*25+"px"
h.style.animationDuration=5+Math.random()*10+"s"

document.querySelector(".hearts").appendChild(h)

}


/* page navigation */

function openPage(p){

document.querySelectorAll(".page").forEach(e=>e.style.display="none")

document.getElementById(p).style.display="block"

}


function enter(){

let code=document.getElementById("room").value

if(code.length>0){

document.getElementById("login").style.display="none"

document.getElementById("home").style.display="block"

}

}

</script>



<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyB_17-XmHxGmGQc_lHuTHoHAK8oVIxJ6W0",
authDomain: "my-poluuuu.firebaseapp.com",
databaseURL: "https://my-poluuuu-default-rtdb.firebaseio.com/",
projectId: "my-poluuuu",
storageBucket: "my-poluuuu.firebasestorage.app",
messagingSenderId: "1052824892709",
appId: "1:1052824892709:web:7e4874adb805f9b5b456cc"
};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

let room="love-room"


/* chat */

window.send=function(){

let msg=document.getElementById("msg").value

if(msg==="")return

push(ref(db,"rooms/"+room+"/chat"),{
text:msg
})

document.getElementById("msg").value=""

}


onValue(ref(db,"rooms/"+room+"/chat"),snap=>{

let box=document.getElementById("messages")

box.innerHTML=""

snap.forEach(d=>{
box.innerHTML+="<p>"+d.val().text+"</p>"
})

})


/* game */

let board=["","","","","","","","",""]
let turn="X"

window.play=function(i){

if(board[i]!="")return

board[i]=turn

turn=turn=="X"?"O":"X"

set(ref(db,"rooms/"+room+"/game"),{
board:board,
turn:turn
})

}


onValue(ref(db,"rooms/"+room+"/game"),snap=>{

if(!snap.exists())return

let data=snap.val()

board=data.board

turn=data.turn

let cells=document.getElementsByClassName("cell")

for(let i=0;i<9;i++)
cells[i].innerText=board[i]

})


window.resetGame=function(){

board=["","","","","","","","",""]

set(ref(db,"rooms/"+room+"/game"),{
board:board,
turn:"X"
})

}

</script>

</body>
</html>
