<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Love App 💖</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

/* animated gradient background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(270deg,#ff4e8a,#ff9ecb,#ff4e8a);
background-size:600% 600%;
animation:bg 14s ease infinite;
z-index:-2;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating hearts */

.heart{
position:absolute;
font-size:18px;
opacity:.6;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* app card */

#app{
width:380px;
height:640px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
display:flex;
flex-direction:column;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* login */

#login{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:15px;
}

input{
padding:10px;
border:none;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#ff2f73;
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* main */

#main{
display:none;
flex-direction:column;
height:100%;
}

/* chat */

#messages{
flex:1;
background:rgba(255,255,255,.2);
border-radius:10px;
overflow:auto;
padding:10px;
margin-bottom:10px;
}

.msg{
background:rgba(255,255,255,.4);
padding:8px;
border-radius:8px;
margin:5px 0;
animation:fade .3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

img{
max-width:120px;
border-radius:10px;
}

/* controls */

#controls{
display:flex;
gap:5px;
}

#controls input{
flex:1;
}

/* emojis */

#emojis{
margin-top:5px;
}

/* game */

#board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.cell{
aspect-ratio:1;
background:white;
color:black;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="app">

<!-- LOGIN -->

<div id="login">

<h2>💖 Enter Password</h2>

<input id="pass">

<button onclick="enter()">Enter</button>

</div>

<!-- MAIN -->

<div id="main">

<h3>Love Chat 💬</h3>

<div id="messages"></div>

<div id="controls">

<input id="msgInput">

<button onclick="sendMsg()">Send</button>

<input type="file" id="photo" onchange="sendPhoto()" style="width:80px">

</div>

<div id="emojis">

<button onclick="emoji('❤️')">❤️</button>
<button onclick="emoji('😘')">😘</button>
<button onclick="emoji('😍')">😍</button>
<button onclick="emoji('🥰')">🥰</button>

</div>

<h3>Tic Tac Toe 🎮</h3>

<div id="board"></div>

<button onclick="resetGame()">Reset</button>

</div>

</div>

<script>

/* hearts animation */

for(let i=0;i<25;i++){

let h=document.createElement("div")

h.className="heart"

h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"

h.style.animationDuration=(6+Math.random()*6)+"s"

document.body.appendChild(h)

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyB_17-XmHxGmGQc_lHuTHoHAK8oVIxJ6W0",
authDomain:"my-poluuuu.firebaseapp.com",
databaseURL:"https://my-poluuuu-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"my-poluuuu"

}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const chatRef=ref(db,"chat")
const boardRef=ref(db,"board")

let board=["","","","","","","","",""]

window.enter=function(){

if(pass.value==="2412"){

login.style.display="none"

main.style.display="flex"

}

}

/* chat */

window.sendMsg=function(){

if(!msgInput.value) return

push(chatRef,{type:"text",text:msgInput.value})

msgInput.value=""

}

window.sendPhoto=function(){

let file=photo.files[0]

let reader=new FileReader()

reader.onload=()=>{

push(chatRef,{type:"img",url:reader.result})

}

reader.readAsDataURL(file)

}

window.emoji=function(e){

msgInput.value+=e

}

onChildAdded(chatRef,d=>{

let m=d.val()

let div=document.createElement("div")

div.className="msg"

if(m.type==="text") div.innerText=m.text

if(m.type==="img"){

let img=document.createElement("img")

img.src=m.url

div.appendChild(img)

}

messages.appendChild(div)

})

/* game */

for(let i=0;i<9;i++){

let cell=document.createElement("div")

cell.className="cell"

cell.onclick=()=>move(i)

board.appendChild

document.getElementById("board").appendChild(cell)

}

function move(i){

if(board[i]) return

board[i]="X"

set(boardRef,board)

}

onValue(boardRef,s=>{

if(!s.exists()) return

board=s.val()

let cells=document.querySelectorAll(".cell")

cells.forEach((c,i)=>c.innerText=board[i])

})

window.resetGame=function(){

board=["","","","","","","","",""]

set(boardRef,board)

}

</script>

</body>
</html>
