<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Love Space 💖</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#ff4e8a,#ff9ecb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#app{
width:380px;
height:600px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:15px;
display:flex;
flex-direction:column;
}

h2{
text-align:center;
margin:5px;
}

/* chat */

#messages{
flex:1;
overflow-y:auto;
}

.msg{
background:rgba(255,255,255,0.3);
margin:6px;
padding:8px;
border-radius:10px;
}

img{
max-width:120px;
border-radius:10px;
}

/* input */

#chatControls{
display:flex;
gap:5px;
}

input{
flex:1;
padding:8px;
border-radius:10px;
border:none;
}

button{
border:none;
padding:8px 10px;
border-radius:8px;
background:#ff2f73;
color:white;
cursor:pointer;
}

/* game */

#game{
margin-top:10px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
margin-top:10px;
}

.cell{
height:60px;
background:white;
color:black;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:8px;
}

</style>
</head>

<body>

<div id="app">

<div id="login">
<h2>💖 Enter Love Passcode</h2>
<input id="pass" placeholder="Passcode">
<button onclick="enter()">Enter</button>
</div>

<div id="main" style="display:none">

<h2>Our Love Chat</h2>

<div id="messages"></div>

<div id="chatControls">
<input id="msgInput">
<button onclick="sendMsg()">Send</button>
<input type="file" id="photo" onchange="sendPhoto()" style="width:80px">
</div>

<div>
<button onclick="addEmoji('❤️')">❤️</button>
<button onclick="addEmoji('😘')">😘</button>
<button onclick="addEmoji('😍')">😍</button>
<button onclick="addEmoji('🥰')">🥰</button>
</div>

<div id="game">

<h2>Tic Tac Toe</h2>

<button onclick="ready()">Ready</button>
<div id="status"></div>

<div class="grid" id="board"></div>

<button onclick="resetGame()">Reset</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyB_17-XmHxGmGQc_lHuTHoHAK8oVIxJ6W0",
authDomain:"my-poluuuu.firebaseapp.com",
databaseURL:"https://my-poluuuu-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"my-poluuuu"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatRef = ref(db,"chat/messages");
const gameRef = ref(db,"game");

let player="";
let board=["","","","","","","","",""];

function enter(){

if(document.getElementById("pass").value==="1234"){

document.getElementById("login").style.display="none"
document.getElementById("main").style.display="flex"

}

}

/* CHAT */

window.sendMsg=function(){

let text=document.getElementById("msgInput").value

push(chatRef,{type:"text",text})

document.getElementById("msgInput").value=""

}

window.sendPhoto=function(){

let file=document.getElementById("photo").files[0]

let reader=new FileReader()

reader.onload=function(){

push(chatRef,{type:"img",url:reader.result})

}

reader.readAsDataURL(file)

}

window.addEmoji=function(e){

document.getElementById("msgInput").value+=e

}

onChildAdded(chatRef,(d)=>{

let data=d.val()

let div=document.createElement("div")
div.className="msg"

if(data.type==="text") div.innerText=data.text

if(data.type==="img"){

let img=document.createElement("img")
img.src=data.url
div.appendChild(img)

}

document.getElementById("messages").appendChild(div)

})

/* GAME */

let boardDiv=document.getElementById("board")

for(let i=0;i<9;i++){

let cell=document.createElement("div")
cell.className="cell"

cell.onclick=()=>move(i)

boardDiv.appendChild(cell)

}

window.ready=function(){

set(ref(db,"game/ready/"+Math.random()),true)

}

onValue(ref(db,"game/ready"),(snap)=>{

if(snap.exists()){

let count=Object.keys(snap.val()).length

if(count>=2){

document.getElementById("status").innerText="Game started"

player=Math.random()>0.5?"X":"O"

}

}

})

function move(i){

if(board[i]!=="" || player==="") return

board[i]=player

set(ref(db,"game/board"),board)

check()

}

onValue(ref(db,"game/board"),(snap)=>{

if(!snap.exists()) return

board=snap.val()

let cells=document.querySelectorAll(".cell")

cells.forEach((c,i)=>c.innerText=board[i])

})

function check(){

let wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
]

for(let w of wins){

let [a,b,c]=w

if(board[a] && board[a]==board[b] && board[a]==board[c]){

alert(board[a]+" wins ❤️")

}

}

}

window.resetGame=function(){

board=["","","","","","","","",""]

set(ref(db,"game/board"),board)

}

</script>

</body>
</html>
