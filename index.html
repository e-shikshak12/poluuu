<!DOCTYPE html>
<html>
<head>
<title>Lokesh ❤️ GF</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
margin:0;
}

.box{
background:white;
padding:30px;
width:320px;
margin:auto;
margin-top:80px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin:5px;
}

table{
margin:auto;
margin-top:20px;
}

.cell{
width:80px;
height:80px;
font-size:30px;
}

#game{
display:none;
}

</style>

</head>

<body>

<div class="box" id="login">

<h2>Our Secret Game ❤️</h2>

<input id="room" placeholder="Enter love code">

<br><br>

<button onclick="joinRoom()">Enter</button>

</div>


<div id="game">

<h2>Lokesh ❤️ GF</h2>

<h3 id="status">Connecting...</h3>

<table>

<tr>
<td><button class="cell" onclick="move(0)"></button></td>
<td><button class="cell" onclick="move(1)"></button></td>
<td><button class="cell" onclick="move(2)"></button></td>
</tr>

<tr>
<td><button class="cell" onclick="move(3)"></button></td>
<td><button class="cell" onclick="move(4)"></button></td>
<td><button class="cell" onclick="move(5)"></button></td>
</tr>

<tr>
<td><button class="cell" onclick="move(6)"></button></td>
<td><button class="cell" onclick="move(7)"></button></td>
<td><button class="cell" onclick="move(8)"></button></td>
</tr>

</table>

<br>

<button onclick="resetGame()">Reset ❤️</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB_17-XmHxGmGQc_lHuTHoHAK8oVIxJ6W0",
authDomain: "my-poluuuu.firebaseapp.com",
projectId: "my-poluuuu",
storageBucket: "my-poluuuu.firebasestorage.app",
messagingSenderId: "1052824892709",
appId: "1:1052824892709:web:7e4874adb805f9b5b456cc",
measurementId: "G-T9P760QJEL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let room=""
let player=""

window.joinRoom = async function(){

room=document.getElementById("room").value

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

const ref=doc(db,"rooms",room)

onSnapshot(ref,(snap)=>{

if(!snap.exists()){

setDoc(ref,{
board:["","","","","","","","",""],
turn:"X"
})

player="X"

}
else{

player="O"

}

updateBoard()

})

}


window.move = async function(i){

const ref=doc(db,"rooms",room)

onSnapshot(ref,(snap)=>{

let data=snap.data()

if(data.board[i]!=="" || data.turn!==player)
return

data.board[i]=player

let next=player==="X"?"O":"X"

updateDoc(ref,{
board:data.board,
turn:next
})

})

}


function updateBoard(){

const ref=doc(db,"rooms",room)

onSnapshot(ref,(snap)=>{

let data=snap.data()

let cells=document.getElementsByClassName("cell")

for(let i=0;i<9;i++)
cells[i].innerText=data.board[i]

document.getElementById("status").innerText="Turn: "+data.turn

checkWinner(data.board)

})

}


function checkWinner(b){

let w=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
]

for(let a of w){

if(b[a[0]]!=="" &&
b[a[0]]===b[a[1]] &&
b[a[1]]===b[a[2]]){

document.getElementById("status").innerText=b[a[0]]+" Wins ❤️"

}

}

}


window.resetGame = async function(){

const ref=doc(db,"rooms",room)

updateDoc(ref,{
board:["","","","","","","","",""],
turn:"X"
})

}

</script>

</body>
</html>
