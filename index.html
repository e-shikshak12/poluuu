<!DOCTYPE html>
<html>
<head>
<title>Lokesh ❤️ GF</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(120deg,#ff758c,#ff7eb3,#ffb199);
}

/* floating hearts */

.hearts{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 10s linear infinite;
opacity:0.7;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-10vh);
opacity:0;
}

}

/* glass card */

.card{

position:relative;
z-index:2;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:25px;

padding:40px;
width:350px;

box-shadow:0 20px 50px rgba(0,0,0,0.3);

color:white;
text-align:center;

animation:fade 1.5s ease;

}

@keyframes fade{

from{
opacity:0;
transform:scale(0.8);
}

to{
opacity:1;
transform:scale(1);
}

}

input{

padding:12px;
width:80%;
border:none;
border-radius:12px;

margin-top:15px;

}

button{

margin-top:15px;

padding:12px 25px;

border:none;
border-radius:12px;

background:#ff4d6d;

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.1);
background:#ff1e56;

}

/* menu */

.menu button{

display:block;
width:200px;
margin:10px auto;

}

/* game board */

table{
margin:auto;
margin-top:20px;
}

.cell{

width:80px;
height:80px;

font-size:30px;

border-radius:10px;

background:white;

color:black;

transition:0.2s;

}

.cell:hover{

background:#ffe5ec;

}

/* chat */

#messages{

height:150px;

overflow:auto;

background:rgba(255,255,255,0.2);

border-radius:10px;

padding:10px;

margin-bottom:10px;

}

.page{
display:none;
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="card">

<!-- LOGIN -->

<div id="login">

<h2>Our Love Space ❤️</h2>

<p>Enter our secret code</p>

<input id="room">

<br>

<button onclick="enter()">Enter</button>

</div>


<!-- HOME -->

<div id="home" class="page">

<h2>Lokesh ❤️ GF</h2>

<div class="menu">

<button onclick="openPage('game')">🎮 Play Game</button>

<button onclick="openPage('chat')">💬 Chat</button>

</div>

</div>


<!-- GAME -->

<div id="game" class="page">

<h3>Tic Tac Toe</h3>

<table>

<tr>
<td><button class="cell"></button></td>
<td><button class="cell"></button></td>
<td><button class="cell"></button></td>
</tr>

<tr>
<td><button class="cell"></button></td>
<td><button class="cell"></button></td>
<td><button class="cell"></button></td>
</tr>

<tr>
<td><button class="cell"></button></td>
<td><button class="cell"></button></td>
<td><button class="cell"></button></td>
</tr>

</table>

<br>

<button onclick="openPage('home')">Back</button>

</div>


<!-- CHAT -->

<div id="chat" class="page">

<h3>Love Chat 💬</h3>

<div id="messages"></div>

<input id="msg">

<button onclick="send()">Send</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>

</div>



<script>

/* floating hearts generator */

for(let i=0;i<25;i++){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"

heart.style.animationDuration=5+Math.random()*10+"s"

heart.style.fontSize=15+Math.random()*25+"px"

document.querySelector(".hearts").appendChild(heart)

}


/* page system */

function openPage(p){

document.querySelectorAll(".page").forEach(e=>e.style.display="none")

document.getElementById(p).style.display="block"

}

function enter(){

let code=document.getElementById("room").value

if(code.length>0){

document.getElementById("login").style.display="none"

document.getElementById("home").style.display="block"

}

}

/* simple chat */

function send(){

let msg=document.getElementById("msg").value

if(msg==="")return

let box=document.getElementById("messages")

box.innerHTML+="<p>"+msg+"</p>"

document.getElementById("msg").value=""

}

</script>

</body>
</html>
