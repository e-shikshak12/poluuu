<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Love Chat ❤️</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4e8a,#ff9ecb,#ffdde1);
overflow:hidden;
}

/* floating hearts */

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 10s infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* chat container */

#app{
width:360px;
height:520px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.15);
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
padding:20px;
color:white;
}

#title{
text-align:center;
font-size:22px;
margin-bottom:10px;
}

/* messages */

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
background:rgba(255,255,255,0.3);
margin:8px 0;
padding:10px;
border-radius:12px;
backdrop-filter:blur(10px);
animation:fadeIn 0.4s;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1;}
}

/* input area */

#inputArea{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

button{
background:#ff4e8a;
border:none;
color:white;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff2f73;
}

</style>
</head>

<body>

<div id="app">

<div id="title">💖 Our Love Chat 💖</div>

<div id="messages"></div>

<div id="inputArea">
<input id="msgInput" placeholder="Type something sweet...">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<!-- floating hearts -->
<script>
for(let i=0;i<20;i++){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(5+Math.random()*5)+"s"
document.body.appendChild(heart)
}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyB_17-XmHxGmGQc_lHuTHoHAK8oVIxJ6W0",
authDomain: "my-poluuuu.firebaseapp.com",
databaseURL: "https://my-poluuuu-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "my-poluuuu",
storageBucket: "my-poluuuu.firebasestorage.app",
messagingSenderId: "1052824892709",
appId: "1:1052824892709:web:7e4874adb805f9b5b456cc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatRef = ref(db,"lovechat/messages");

window.sendMsg=function(){

let input=document.getElementById("msgInput")
let text=input.value

if(text==="") return

push(chatRef,{
message:text,
time:Date.now()
})

input.value=""
}

onChildAdded(chatRef,(data)=>{

let msg=data.val().message

let div=document.createElement("div")
div.className="msg"
div.innerText=msg

document.getElementById("messages").appendChild(div)

})

</script>

</body>
</html>
